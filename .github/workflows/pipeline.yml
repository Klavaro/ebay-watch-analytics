name: Snowflake Data Loader

on:
  # Trigger on pushes to main branch
  push:
    branches: ["main"]
  # Allow manual triggers
  workflow_dispatch:

jobs:
  load-data:
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install snowflake-connector-python python-dotenv

      - name: Test Snowflake Connection & Data Loading
        run: |
          echo "=== Testing Connection ==="
          python -c "
          import os, snowflake.connector;
          try:
            # 1. Test connection
            conn = snowflake.connector.connect(
              user=os.getenv('SNOWFLAKE_USER'),
              password=os.getenv('SNOWFLAKE_PASSWORD'),
              account=os.getenv('SNOWFLAKE_ACCOUNT'),
              warehouse=os.getenv('SNOWFLAKE_WAREHOUSE'),
              database=os.getenv('SNOWFLAKE_DATABASE'),
              schema=os.getenv('SNOWFLAKE_SCHEMA'),
              role=os.getenv('SNOWFLAKE_ROLE', 'EBAY_DEVELOPER')
            );
            print('✓ Connection successful');
            
            # 2. Test data loading
            cursor = conn.cursor();
            cursor.execute('''
              INSERT INTO EBAY_WATCH_ANALYTICS.RAW.EBAY_WATCHES (item_id, title, price, extraction_timestamp) 
              VALUES (%s, %s, %s, CURRENT_TIMESTAMP())
            ''', ('github_test_001', 'GitHub Test Watch', 999.99));
            conn.commit();
            print('✓ Test data inserted');
            
            # 3. Verify data exists
            cursor.execute('SELECT COUNT(*) FROM EBAY_WATCH_ANALYTICS.RAW.EBAY_WATCHES WHERE item_id = %s', ('github_test_001',));
            count = cursor.fetchone()[0];
            if count == 0:
              raise Exception('Data verification failed: Test record not found');
            print(f'✓ Verification passed: {count} test records found');
            
          except Exception as e:
            print('❌ Error:', str(e));
            raise
          "
