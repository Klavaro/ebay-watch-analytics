name: Snowflake Data Loader

on:
  # Trigger on pushes to main branch
  push:
    branches: ["main"]
  # Allow manual triggers
  workflow_dispatch:

jobs:
  load-data:
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install snowflake-connector-python python-dotenv

      - name: Debug Snowflake Connection
        run: |
          echo "Testing connection with:"
          echo "Account: ${{ secrets.SNOWFLAKE_ACCOUNT }}"
          echo "User: ${{ secrets.SNOWFLAKE_USER }}"

          python -c "
          import os, snowflake.connector;
          print('Trying to connect...');
          try:
            conn = snowflake.connector.connect(
              user=os.getenv('SNOWFLAKE_USER'),
              password=os.getenv('SNOWFLAKE_PASSWORD'),
              account=os.getenv('SNOWFLAKE_ACCOUNT'),
              warehouse=os.getenv('SNOWFLAKE_WAREHOUSE'),
              database=os.getenv('SNOWFLAKE_DATABASE'),
              role=os.getenv('SNOWFLAKE_ROLE', 'EBAY_DEVELOPER')
            );
            print('Success! Snowflake version:', conn.cursor().execute('SELECT CURRENT_VERSION()').fetchone()[0]);
          except Exception as e:
            print('FAILED:', str(e));
            raise
          "
